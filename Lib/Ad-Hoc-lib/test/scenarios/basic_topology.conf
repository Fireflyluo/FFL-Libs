; Ad-Hoc-lib 仿真场景配置
; 格式说明:
;   [nodes]    节点数N
;   [topo]     from to rssi    (from/to为0~N-1的节点索引)
;   [node]     index role gateway_no node_id
;   role:      G=网关 B=信标
;   rssi:      可达时用负dBm值(如-40表示-40dBm)，不可达用x

; 场景1: 全连通3节点 (1网关 + 2信标)
[nodes]
3
[topo]
0 1 -40
0 2 -40
1 0 -40
1 2 -50
2 0 -40
2 1 -50
[node]
0 G 0 1
[node]
1 B 0 1000001
[node]
2 B 0 1000002

; 场景2: 链式3节点 (网关-信标1-信标2, 信标之间不可直接通网关)
;
; [nodes]
; 3
; [topo]
; 0 1 -40
; 1 0 -40
; 1 2 -50
; 2 1 -50
; [node]
; 0 G 0 1
; [node]
; 1 B 0 1000001
; [node]
; 2 B 0 1000002
;
; 说明: 信标2 只能通过信标1中继，验证二级入网(C1->CN)和数据转发

; 场景3: 多网关冗余
;
; [nodes]
; 4
; [topo]
; 0 2 -45
; 0 3 -60
; 1 2 -55
; 1 3 -45
; 2 0 -45
; 2 1 -55
; 3 0 -60
; 3 1 -45
; [node]
; 0 G 0 1
; [node]
; 1 G 1 2
; [node]
; 2 B 0 1000001
; [node]
; 3 B 0 1000002
;
; 说明: 信标同时可见两个网关，验证Top-K邻居选择和方向锁定
